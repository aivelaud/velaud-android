name: Build Velaud APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write gradle.properties with secrets
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          org.gradle.parallel=true
          org.gradle.caching=true
          BACKEND_URL="${{ secrets.BACKEND_URL }}"
          AZURE_KEY_PRIMARY="${{ secrets.AZURE_KEY_PRIMARY }}"
          AZURE_KEY_SECONDARY="${{ secrets.AZURE_KEY_SECONDARY }}"
          AZURE_CLAUDE_URL="${{ secrets.AZURE_CLAUDE_URL }}"
          AZURE_GPT_URL="${{ secrets.AZURE_GPT_URL }}"
          AZURE_GPT_PRO_URL="${{ secrets.AZURE_GPT_PRO_URL }}"
          AZURE_KIMI_URL="${{ secrets.AZURE_KIMI_URL }}"
          AZURE_DEEPSEEK_URL="${{ secrets.AZURE_DEEPSEEK_URL }}"
          TAVILY_KEY="${{ secrets.TAVILY_KEY }}"
          EOF

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: velaud-debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace
        continue-on-error: true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: velaud-release-apk-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
        continue-on-error: true
